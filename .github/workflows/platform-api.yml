name: Platform API CI/CD

on:
  push:
    branches: [main, feature/super_admin]
    paths: ['platform-api/**']
  pull_request:
    branches: [main]
    paths: ['platform-api/**']

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: platform-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.PLATFORM_DATABASE_URL }}

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-min-32-chars-here
          DATABASE_URL: ${{ secrets.PLATFORM_DATABASE_URL }}

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: platform-api

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service platform-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
